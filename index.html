<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Birthday Experience</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh; /* Modern dynamic viewport height for mobile screens */
}

body{
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#2e1065 0%,#0f172a 40%,#020617 100%);
  overflow:hidden;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ================= BACKGROUND BLUR ================= */

.bg1,.bg2{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:.45;
  z-index:0;
}

.bg1{
  width:45vw;
  height:45vw;
  min-width:250px;
  min-height:250px;
  background:#ff0080;
  top:-10vw;
  left:-10vw;
  animation:bgMove1 12s infinite alternate ease-in-out;
}

.bg2{
  width:40vw;
  height:40vw;
  min-width:220px;
  min-height:220px;
  background:#00ffff;
  bottom:-10vw;
  right:-10vw;
  animation:bgMove2 14s infinite alternate ease-in-out;
}

@keyframes bgMove1{
  to{
    transform:translate(5vw,5vw) scale(1.2);
  }
}

@keyframes bgMove2{
  to{
    transform:translate(-5vw,-5vw) scale(1.25);
  }
}

/* ================= STARS ================= */

.stars{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
  from{
    opacity:.2;
    transform:scale(.6);
  }
  to{
    opacity:1;
    transform:scale(1.8);
  }
}

/* ================= SHOOTING STARS ================= */

.shooting-star{
  position:absolute;
  width:180px;
  height:2px;
  background:linear-gradient(to right,white,transparent);
  opacity:.7;
  transform:rotate(-35deg);
  animation:shoot 5s linear infinite;
  z-index:1;
}

@keyframes shoot{
  0%{
    transform:translate(-300px,-300px) rotate(-35deg);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:translate(120vw,100vh) rotate(-35deg);
    opacity:0;
  }
}

/* ================= CANVAS ================= */

canvas{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:2;
}

/* ================= MAIN CONTAINER ================= */

.container{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  z-index: 10;
  pointer-events: none; /* Let background clicks pass through to canvas safely */
}

/* ================= RINGS ================= */

.ring-wrapper{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  pointer-events:none;
}

.ring1,.ring2{
  position:absolute;
  border-radius:50%;
}

.ring1{
  width:min(70vw,600px);
  height:min(70vw,600px);
  border:1px solid rgba(255,255,255,.08);
  animation:rotate 25s linear infinite;
}

.ring2{
  width:min(55vw,450px);
  height:min(55vw,450px);
  border:2px dashed rgba(255,255,255,.1);
  animation:rotateReverse 18s linear infinite;
}

@keyframes rotate{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

@keyframes rotateReverse{
  from{
    transform:rotate(360deg);
  }
  to{
    transform:rotate(0deg);
  }
}

/* ================= CARD ================= */

.card{
  position:relative;
  pointer-events: auto; /* Reactivates click events for items on the card */
  width: 100%;
  max-width: 440px; /* Scaled down slightly more for balanced vertical layout */
  padding: clamp(24px, 5vw, 36px);
  border-radius:24px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,0.12),
      rgba(255,255,255,0.03)
    );

  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);

  border:1px solid rgba(255,255,255,.1);

  box-shadow:
    0 0 50px rgba(255,255,255,.06),
    0 0 120px rgba(255,0,128,.12);

  overflow:hidden;
  text-align:center;
  animation:floatCard 6s infinite ease-in-out;
}

@keyframes floatCard{
  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-8px);
  }
}

/* SHINE */

.card::before{
  content:'';
  position:absolute;
  width:200%;
  height:200px;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.18),
      transparent
    );

  top:-100px;
  left:-150%;
  transform:rotate(-25deg);

  animation:shine 6s infinite;
}

@keyframes shine{
  100%{
    left:150%;
  }
}

/* ================= TEXT ================= */

.top{
  color:#dbeafe;
  letter-spacing:3px;
  font-size:clamp(.65rem,1.5vw,.8rem);
  margin-bottom:14px;
}

.title{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.line{
  display:flex;
  justify-content:center;
  flex-wrap:nowrap; /* Strict letter grouping so words never stack awkwardly */
}

.letter{
  display:inline-block;
  font-size: clamp(1.6rem, 7.5vw, 3.4rem);
  font-weight:800;
  margin:0 2px;
  opacity:0;

  transform:
    translateY(80px)
    scale(.5)
    rotateX(90deg);

  background:
    linear-gradient(
      90deg,
      #ffffff,
      #ff9ed8,
      #7cf7ff,
      #ffffff
    );

  background-size:300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 25px rgba(255,255,255,.2);

  animation:
    letterReveal 1s forwards,
    gradientFlow 5s linear infinite;
}

@keyframes letterReveal{
  100%{
    opacity:1;
    transform:
      translateY(0)
      scale(1)
      rotateX(0deg);
  }
}

@keyframes gradientFlow{
  to{
    background-position:300%;
  }
}

.name{
  margin-top:16px;
  font-family:'Dancing Script',cursive;
  font-size: clamp(1.4rem, 5.5vw, 2.4rem);
  color:white;
  opacity:0;

  animation:fadeIn 2s forwards;
  animation-delay:2.3s;

  line-height:1.3;

  text-shadow:
    0 0 25px rgba(255,255,255,.2);

  word-break:break-word;
}

.message{
  margin-top:14px;
  color:rgba(255,255,255,.88);
  font-size: clamp(.8rem, 2.2vw, 0.95rem);
  line-height:1.6;
  max-width:380px;
  margin-left:auto;
  margin-right:auto;
  opacity:0;

  animation:fadeIn 1.5s forwards;
  animation-delay:3s;
}

@keyframes fadeIn{
  to{
    opacity:1;
  }
}

/* ================= FLOATING LIGHTS ================= */

.light{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  filter:blur(2px);
  animation:floatLight linear infinite;
  z-index:3;
}

@keyframes floatLight{
  from{
    transform:
      translateY(110vh)
      scale(.5);

    opacity:0;
  }

  20%{
    opacity:1;
  }

  to{
    transform:
      translateY(-120vh)
      scale(1.6);

    opacity:0;
  }
}

/* ================= RESPONSIVENESS OVERRIDES ================= */

@media (max-width:768px){
  .ring1{
    width:85vw;
    height:85vw;
  }

  .ring2{
    width:70vw;
    height:70vw;
  }

  .card{
    border-radius:20px;
    padding:28px 18px;
    width: 88vw; /* Fixed viewport width reference for phone bounds */
  }

  .top{
    letter-spacing:2px;
  }

  .shooting-star{
    width:120px;
  }
}

@media (max-width:480px) {
  .ring-wrapper {
    display:none;
  }

  .card {
    width: 90vw;
    padding: 24px 16px;
  }

  .message {
    line-height: 1.5;
  }

  .bg1, .bg2 {
    filter: blur(90px);
  }
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="shooting-star" style="top:10%;left:-10%;animation-delay:0s"></div>
<div class="shooting-star" style="top:30%;left:-20%;animation-delay:2.5s"></div>
<div class="shooting-star" style="top:55%;left:-15%;animation-delay:4.5s"></div>

<div class="stars"></div>

<canvas id="canvas"></canvas>

<div class="container">
  <div class="ring-wrapper">
    <div class="ring1"></div>
    <div class="ring2"></div>
  </div>

  <div class="card">
    <div class="top">
      ✨ TODAY IS ALL ABOUT YOU ✨
    </div>

    <div class="title">
      <div id="row1" class="line"></div>
      <div id="row2" class="line"></div>
    </div>

    <div class="name">
      To My Darling Bestie Ji 💖
    </div>

    <div class="message">
      May your future glow brighter than every firework in the sky tonight.
    </div>
  </div>
</div>

<script>

/* ================= STARS ================= */

const stars = document.querySelector('.stars');
const totalStars = window.innerWidth < 768 ? 90 : 180;

for(let i=0;i<totalStars;i++){
  const star = document.createElement('div');
  star.classList.add('star');

  star.style.left = Math.random()*100 + '%';
  star.style.top = Math.random()*100 + '%';
  star.style.animationDuration = (Math.random()*3 + 2) + 's';

  stars.appendChild(star);
}

/* ================= LETTERS ================= */

const word1 = 'HAPPY';
const word2 = 'BIRTHDAY';

const r1 = document.getElementById('row1');
const r2 = document.getElementById('row2');

let li = 0;

word1.split('').forEach(c=>{
  const s = document.createElement('span');
  s.className = 'letter';
  s.textContent = c;
  s.style.animationDelay = `${li*0.1}s, ${li*0.05}s`;
  r1.appendChild(s);
  li++;
});

word2.split('').forEach(c=>{
  const s = document.createElement('span');
  s.className = 'letter';
  s.textContent = c;
  s.style.animationDelay = `${li*0.1}s, ${li*0.05}s`;
  r2.appendChild(s);
  li++;
});

/* ================= LIGHTS ================= */

const colors = [
  '#ff4d9d',
  '#7cf7ff',
  '#ffd166',
  '#ffffff',
  '#9b5cff'
];

function createLight(){
  const light = document.createElement('div');
  light.classList.add('light');
  light.style.left = Math.random()*100 + 'vw';

  const color = colors[Math.floor(Math.random()*colors.length)];
  light.style.background = color;
  light.style.boxShadow = `0 0 20px ${color}`;
  light.style.animationDuration = (Math.random()*6 + 5) + 's';

  document.body.appendChild(light);

  setTimeout(()=>{
    light.remove();
  },12000);
}

setInterval(createLight,350);

/* ================= FIREWORKS ================= */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();

let particles = [];

class Particle{
  constructor(x,y,color){
    this.x = x;
    this.y = y;
    this.color = color;
    this.radius = Math.random()*2 + 1.5;
    this.speedX = (Math.random()-.5)*10;
    this.speedY = (Math.random()-.5)*10;
    this.alpha = 1;
    this.gravity = .04;
  }

  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    this.speedY += this.gravity;
    this.alpha -= .012;
  }

  draw(){
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

function createFirework(x,y){
  const particleCount = window.innerWidth < 768 ? 45 : 100;

  for(let i=0;i<particleCount;i++){
    particles.push(
      new Particle(
        x,
        y,
        colors[Math.floor(Math.random()*colors.length)]
      )
    );
  }
}

function animate(){
  ctx.fillStyle = 'rgba(2,6,23,.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p,i)=>{
    p.update();
    p.draw();
    if(p.alpha <= 0){
      particles.splice(i,1);
    }
  });

  requestAnimationFrame(animate);
}

animate();

setInterval(()=>{
  createFirework(
    Math.random()*canvas.width,
    Math.random()*canvas.height/2
  );
},1600);

/* CLICK FIREWORKS */

window.addEventListener('click',(e)=>{
  createFirework(
    e.clientX,
    e.clientY
  );
});

window.addEventListener('resize', resizeCanvas);

</script>

</body>
</html>

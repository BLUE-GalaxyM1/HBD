<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Happy Birthday, Sis!</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
}

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #0d1b2a 0%, #0f172a 60%, #020617 100%);
  overflow: hidden;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ================= ELEGANT BLUE AMBIENT GLOWS ================= */
.aura-cyan, .aura-royal {
  position: absolute;
  border-radius: 50%;
  filter: blur(140px);
  opacity: 0.35;
  z-index: 0;
  pointer-events: none;
}

.aura-cyan {
  width: 45vw;
  height: 45vw;
  background: #00f2fe;
  top: -5%;
  left: -5%;
  animation: floatAura1 12s infinite alternate ease-in-out;
}

.aura-royal {
  width: 40vw;
  height: 40vw;
  background: #415a77;
  bottom: -5%;
  right: -5%;
  animation: floatAura2 14s infinite alternate ease-in-out;
}

@keyframes floatAura1 { to { transform: translate(5vw, 5vw) scale(1.1); } }
@keyframes floatAura2 { to { transform: translate(-5vw, -5vw) scale(1.15); } }

/* ================= BACKGROUND CANVAS ================= */
canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* ================= BULLETPROOF LAYOUT HOLDER ================= */
.fixed-layout-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  z-index: 10;
  pointer-events: none;
}

/* ================= CRYSTAL GLASSMORPHISM CARD ================= */
.elegant-card {
  position: relative;
  pointer-events: auto;
  width: 90vw;
  max-width: 390px;
  padding: 35px 24px;
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(13, 27, 42, 0.65), rgba(2, 6, 23, 0.5));
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid rgba(0, 242, 254, 0.2);
  box-shadow: 
    0 0 40px rgba(0, 242, 254, 0.08),
    0 0 80px rgba(13, 27, 42, 0.5);
  overflow: hidden;
  text-align: center;
  animation: elegantFloat 6s infinite ease-in-out;
}

@keyframes elegantFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-7px); }
}

/* SOFT SHIMMER OVERLAY */
.elegant-card::before {
  content: '';
  position: absolute;
  top: 0; left: -150%; width: 200%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
  transform: skewX(-20deg);
  animation: cardShimmer 7s infinite ease-in-out;
}

@keyframes cardShimmer {
  0%, 30% { left: -150%; }
  100% { left: 150%; }
}

/* ================= TEXT STYLING WITH REVEAL & GRADIENT FLOW ================= */
.top-tag {
  font-size: 0.72rem;
  letter-spacing: 5px;
  color: #e0f2fe;
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 300;
  text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
}

.main-title {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 16px;
}

.text-row {
  display: flex;
  justify-content: center;
  flex-wrap: nowrap;
}

.sparkle-letter {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 8vw, 2.8rem);
  font-weight: 700;
  margin: 0 2px;
  opacity: 0;
  transform: translateY(80px) scale(.5) rotateX(90deg);
  background: linear-gradient(90deg, #ffffff, #3a86ff, #7cf7ff, #ffffff);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 25px rgba(255,255,255,.2);
  animation: 
    letterReveal 1s forwards, 
    gradientFlow 5s linear infinite;
}

@keyframes letterReveal {
  100% {
    opacity: 1;
    transform: translateY(0) scale(1) rotateX(0deg);
  }
}

@keyframes gradientFlow {
  to {
    background-position: 300%;
  }
}

/* ================= TEXT ANIMATION EFFECTS ================= */
.dedication {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1.3rem, 5.5vw, 1.8rem);
  color: #fff;
  margin-bottom: 12px;
  opacity: 0; /* Hidden initially for fade reveal sequence */
}

.dedication span {
  color: #bae6fd;
  font-weight: 600;
  text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
}

/* Upright blue heart with a staggered bounce-scale reveal */
.heart-pop {
  font-style: normal; 
  display: inline-block;
  opacity: 0;
  transform: scale(0.5);
  animation: heartReveal 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  animation-delay: 2.3s; /* Pops up right as the line finishes drawing */
}

.message-body {
  font-size: clamp(0.82rem, 2.8vw, 0.95rem);
  color: #cbd5e1;
  line-height: 1.6;
  max-width: 320px;
  margin: 0 auto;
  font-weight: 300;
  opacity: 0; /* Hidden initially for sequence */
}

/* --- ANIMATION TRIGGERS --- */
.animate-fade-up {
  animation: fadeInUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  animation-delay: 1.8s; /* Starts right after main title letters drop */
}

.animate-fade-up-delayed {
  animation: fadeInUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  animation-delay: 2.6s; /* Drifts up smoothly at the very end */
}

/* --- KEYFRAMES --- */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes heartReveal {
  to {
    opacity: 1;
    transform: scale(1);
    filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
  }
}

/* ================= MAGIC GLOWING DUST PARTICLES ================= */
.magic-dust {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #fff;
  animation: driftUp linear infinite;
  z-index: 3;
  pointer-events: none;
}

@keyframes driftUp {
  from { transform: translateY(110vh) translateX(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.3; }
  to { transform: translateY(-10vh) translateX(30px); opacity: 0; }
}

/* ================= PHONE SCREEN ADJUSTMENTS ================= */
@media (max-width: 480px) {
  .elegant-card {
    width: 88vw;
    padding: 30px 20px;
    border-radius: 24px;
  }
  .sparkle-letter {
    font-size: 2.2rem;
  }
}
</style>
</head>

<body>

<div class="aura-cyan"></div>
<div class="aura-royal"></div>
<canvas id="sparkleCanvas"></canvas>

<div class="fixed-layout-container">
  <div class="elegant-card">
    
    <div class="top-tag">✨ Celebrating You ✨</div>
    
    <div class="main-title">
      <div id="row1" class="text-row"></div>
      <div id="row2" class="text-row"></div>
    </div>
    
    <div class="dedication animate-fade-up">
      To My <span>Darling Bestie ji</span> <span class="heart-pop">💙</span>
    </div>
    
    <div class="message-body animate-fade-up-delayed">
      Always be happy and blessed. Thank you for always being the best Bestie ever!
    </div>

  </div>
</div>

<script>
/* ================= SEQUENCED LETTER WRITER ================= */
const textLine1 = "HAPPY";
const textLine2 = "BIRTHDAY";
const target1 = document.getElementById('row1');
const target2 = document.getElementById('row2');

let combinedIndex = 0;

function generateLetters(word, targetGrid) {
  word.split('').forEach(letter => {
    const span = document.createElement('span');
    span.className = 'sparkle-letter';
    span.textContent = letter;
    span.style.animationDelay = `${combinedIndex * 0.1}s, ${combinedIndex * 0.05}s`;
    targetGrid.appendChild(span);
    combinedIndex++;
  });
}

generateLetters(textLine1, target1);
generateLetters(textLine2, target2);

/* ================= FLOATING BLUE FAIRY DUST ================= */
function spawnDust() {
  const dust = document.createElement('div');
  dust.classList.add('magic-dust');
  dust.style.left = Math.random() * 100 + 'vw';
  
  const size = Math.random() * 3 + 2;
  dust.style.width = size + 'px';
  dust.style.height = size + 'px';
  
  const palette = ['#ffffff', '#e0f2fe', '#bae6fd', '#7cd1ff', '#00f2fe'];
  dust.style.background = palette[Math.floor(Math.random() * palette.length)];
  dust.style.boxShadow = `0 0 8px ${dust.style.background}`;
  
  dust.style.animationDuration = (Math.random() * 5 + 6) + 's';
  document.body.appendChild(dust);
  
  setTimeout(() => dust.remove(), 11000);
}
setInterval(spawnDust, 300);

/* ================= SHIMMER CYAN STARDUST CANVAS ENGINE ================= */
const canvas = document.getElementById('sparkleCanvas');
const ctx = canvas.getContext('2d');

function syncCanvasSize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
syncCanvasSize();
window.addEventListener('resize', syncCanvasSize);

let particlePool = [];
const colorPalette = ['#ffffff', '#e0f2fe', '#7cd1ff', '#00b4d8', '#00f2fe'];

class SparkleParticle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.radius = Math.random() * 2 + 1;
    
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 0.5;
    this.dx = Math.cos(angle) * speed;
    this.dy = Math.sin(angle) * speed;
    
    this.alpha = 1;
    this.fade = Math.random() * 0.012 + 0.008;
    this.friction = 0.97;
    this.gravity = 0.03;
  }

  update() {
    this.dx *= this.friction;
    this.dy *= this.friction;
    this.dy += this.gravity;
    this.x += this.dx;
    this.y += this.dy;
    this.alpha -= this.fade;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.restore();
  }
}

function triggerBurst(x, y) {
  const density = window.innerWidth < 768 ? 35 : 70;
  for (let i = 0; i < density; i++) {
    const randomColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
    particlePool.push(new SparkleParticle(x, y, randomColor));
  }
}

function loop() {
  ctx.fillStyle = 'rgba(15, 23, 42, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = particlePool.length - 1; i >= 0; i--) {
    const item = particlePool[i];
    item.update();
    item.draw();
    if (item.alpha <= 0) {
      particlePool.splice(i, 1);
    }
  }
  requestAnimationFrame(loop);
}
loop();

setInterval(() => {
  triggerBurst(
    Math.random() * canvas.width,
    Math.random() * (canvas.height * 0.5)
  );
}, 1800);

window.addEventListener('click', (e) => {
  triggerBurst(e.clientX, e.clientY);
});
</script>

</body>
</html>
